services:
  mysql:
    image: mysql:8.0
    container_name: bankapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Test@123
      MYSQL_DATABASE: bankappdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bankapp-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -pTest@123 || exit 1"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 6 
      

  bankapp: 
    build: .
    container_name: bankapp
    ports:
      - "8080:8080"
    networks:
      - bankapp-network
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: bankappdb 
      MYSQL_USER: root
      MYSQL_PASSWORD: Test@123
      OLLAMA_URL: http://ollama:11434   
    depends_on:
      mysql:
        condition: service_healthy
         

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    networks:
      - bankapp-network
    volumes:
      - ollama_data:/root/.ollama    

networks:
  bankapp-network:
    driver: bridge

volumes:
  mysql-data:
  ollama_data: